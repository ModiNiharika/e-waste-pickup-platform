<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eco-Collect | Admin Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { align-items: center; justify-content: center; }

        .admin-login-wrap {
            width: 100%;
            max-width: 400px;
            animation: fadeInUp 0.5s ease-out;
        }

        .admin-login-logo {
            text-align: center;
            margin-bottom: 28px;
        }

        .admin-login-icon {
            font-size: 2.6rem;
            display: block;
            margin-bottom: 10px;
        }

        .admin-login-logo h1 {
            font-size: 1.6rem;
            font-weight: 700;
        }

        .admin-login-logo p {
            color: #818cf8;
            font-size: 0.88rem;
            margin-top: 4px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .admin-login-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 22px;
            padding: 32px 28px;
        }

        .admin-login-label {
            font-size: 0.88rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            display: block;
        }

        .admin-login-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(99, 102, 241, 0.25);
            border-radius: 12px;
            padding: 13px 16px;
            font-size: 1rem;
            font-family: 'Outfit', sans-serif;
            color: var(--text-main);
            letter-spacing: 2px;
            transition: border-color 0.2s ease;
            margin-bottom: 16px;
            box-sizing: border-box;
        }

        .admin-login-input:focus {
            outline: none;
            border-color: #818cf8;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.12);
        }

        .admin-login-btn {
            width: 100%;
            padding: 13px;
            background: #6366f1;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            margin-top: 0;
            transition: background 0.2s ease, transform 0.15s ease, opacity 0.15s ease;
        }

        .admin-login-btn:hover:not(:disabled) { background: #4f46e5; transform: translateY(-1px); }
        .admin-login-btn:active:not(:disabled) { transform: translateY(0); }
        .admin-login-btn:disabled { opacity: 0.55; cursor: not-allowed; }

        .admin-login-error {
            color: #f87171;
            font-size: 0.84rem;
            margin-top: 12px;
            text-align: center;
        }

        .admin-back-link {
            display: block;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.84rem;
            text-decoration: none;
            margin-top: 18px;
            transition: color 0.2s ease;
        }

        .admin-back-link:hover { color: var(--text-main); }

        .admin-hint {
            text-align: center;
            margin-top: 20px;
            font-size: 0.78rem;
            color: rgba(255,255,255,0.2);
        }
    </style>
</head>

<body>
    <div class="admin-login-wrap">

        <div class="admin-login-logo">
            <span class="admin-login-icon">&#9851;&#65039;</span>
            <h1>Eco&#8209;Collect</h1>
            <p>&#128737;&#65039; Admin Access</p>
        </div>

        <div class="admin-login-card">
            <label class="admin-login-label" for="admin-code">Admin Access Code</label>
            <input
                type="password"
                id="admin-code"
                class="admin-login-input"
                placeholder="Enter access code"
                autocomplete="off"
                maxlength="30"
            >
            <button class="admin-login-btn" id="admin-login-btn">Access Dashboard &#8594;</button>
            <p class="admin-login-error" id="admin-error" style="display:none"></p>
        </div>

        <a href="index.html" class="admin-back-link">&#8592; Back to User Site</a>
        <p class="admin-hint">Demo code: ECO-ADMIN-2024</p>

    </div>

    <script src="auth.js"></script>
    <script>
        // Already authenticated → go straight to dashboard
        if (getAdminUser()) {
            location.replace('admin.html');
        }

        const ADMIN_CODE = 'ECO-ADMIN-2024';

        function showErr(msg) {
            const errEl = document.getElementById('admin-error');
            errEl.textContent    = msg;
            errEl.style.display  = 'block';
        }

        function attemptLogin() {
            const input = document.getElementById('admin-code');
            const code  = input.value.trim();
            const btn   = document.getElementById('admin-login-btn');

            if (!code) {
                showErr('Please enter the access code.');
                return;
            }

            if (code !== ADMIN_CODE) {
                showErr('Incorrect access code. Please try again.');
                input.value = '';
                input.focus();
                return;
            }

            // Correct — store session with the entered code as the API token
            document.getElementById('admin-error').style.display = 'none';
            btn.disabled    = true;
            btn.textContent = 'Redirecting…';
            setAdminUser(code);
            location.replace('admin.html');
        }

        document.getElementById('admin-login-btn').addEventListener('click', attemptLogin);
        document.getElementById('admin-code').addEventListener('keydown', e => {
            if (e.key === 'Enter') attemptLogin();
        });
    </script>
</body>

</html>
